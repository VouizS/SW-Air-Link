name: Build Flutter Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter Android project
        working-directory: mobile
        run: |
          flutter --version
          flutter create --platforms=android --project-name sw_air_link .
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          perm1 = '<uses-permission android:name="android.permission.INTERNET" />'
          perm2 = '<uses-permission android:name="android.permission.INTERNET"/>'
          if perm1 not in text and perm2 not in text:
              text = text.replace('<application', f'{perm1}\n    <application', 1)
          if 'android:usesCleartextTraffic' not in text:
              text = text.replace('<application', '<application android:usesCleartextTraffic="true"', 1)
          manifest.write_text(text)
          PY
          flutter pub get

      - name: Analyze Flutter project
        working-directory: mobile
        run: flutter analyze

      - name: Test Flutter project
        working-directory: mobile
        run: flutter test

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp mobile/build/app/outputs/flutter-apk/app-debug.apk "dist/SW-Air-Link-v0.2-r1-debug.apk"
          ls -lh dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SW-Air-Link-v0.2-r1-debug
          path: dist/SW-Air-Link-v0.2-r1-debug.apk
          if-no-files-found: error

name: SW Air Link Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Ensure Android project exists
        working-directory: mobile
        run: |
          flutter create --platforms=android --project-name=sw_air_link --org=com.swairlink .

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze Flutter project
        working-directory: mobile
        run: flutter analyze

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug --build-name=0.1.1 --build-number=${{ github.run_number }}

      - name: Prepare artifact
        run: |
          mkdir -p out
          SHORT_SHA="${GITHUB_SHA:0:7}"
          cp mobile/build/app/outputs/flutter-apk/app-debug.apk "out/SW-Air-Link-v0.1-r2-run-${GITHUB_RUN_NUMBER}-${SHORT_SHA}-debug.apk"
          ls -lah out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SW-Air-Link-v0.1-r2-APK
          path: out/*.apk
          if-no-files-found: error

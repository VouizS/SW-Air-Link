name: Build Flutter Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter Android project
        working-directory: mobile
        run: |
          flutter --version
          flutter create --platforms=android --project-name sw_air_link .
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" />',
          ]
          for permission in permissions:
              compact = permission.replace(' />', '/>')
              if permission not in text and compact not in text:
                  text = text.replace('<application', f'{permission}\n    <application', 1)
          if 'android:usesCleartextTraffic' not in text:
              text = text.replace('<application', '<application android:usesCleartextTraffic="true"', 1)
          manifest.write_text(text)
          PY
          flutter pub get

      - name: Analyze Flutter project
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Test Flutter project
        working-directory: mobile
        run: flutter test

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp mobile/build/app/outputs/flutter-apk/app-debug.apk "dist/SW-Air-Link-v0.3-r1-debug.apk"
          ls -lh dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SW-Air-Link-v0.3-r1-debug
          path: dist/SW-Air-Link-v0.3-r1-debug.apk
          if-no-files-found: error

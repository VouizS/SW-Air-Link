name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter project
        working-directory: mobile
        run: |
          flutter --version
          flutter create --platforms=android --project-name sw_air_link .
          flutter pub get

      - name: Analyze Flutter project
        working-directory: mobile
        run: flutter analyze

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp mobile/build/app/outputs/flutter-apk/app-debug.apk artifacts/SW-Air-Link-v0.1-r4-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SW-Air-Link-v0.1-r4-debug-apk
          path: artifacts/*.apk
          if-no-files-found: error

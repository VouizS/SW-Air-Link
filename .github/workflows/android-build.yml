name: Build Flutter Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter Android project
        run: |
          flutter --version
          flutter create --platforms=android --project-name sw_air_link .
          cp app_templates/pubspec.yaml pubspec.yaml
          cp app_templates/main.dart lib/main.dart
          mkdir -p test
          cp app_templates/widget_test.dart test/widget_test.dart
          if [ -d native_templates/android ] && find native_templates/android -mindepth 1 -print -quit | grep -q .; then
            cp -R native_templates/android/* android/
          else
            echo "native_templates/android vazio ou ausente. Build seguirá sem nativo customizado."
          fi
          flutter pub get

      - name: Analyze Flutter project
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests without blocking experimental APK
        run: |
          set +e
          flutter test
          TEST_EXIT=$?
          set -e
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "Flutter test failed, but experimental debug APK will continue."
          fi

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Prepare APK artifact
        run: |
          mkdir -p ../dist
          cp build/app/outputs/flutter-apk/app-debug.apk "../dist/SW-Air-Link-v0.3-r9-debug.apk"
          ls -lh ../dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SW-Air-Link-v0.3-r9-debug
          path: dist/SW-Air-Link-v0.3-r9-debug.apk
          if-no-files-found: error

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SW Air Link</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #090b10;
      color: #f3f6fb;
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      width: min(92vw, 520px);
      border: 1px solid #252b38;
      background: #141923;
      border-radius: 22px;
      padding: 28px;
      text-align: center;
      box-sizing: border-box;
    }
    h1 { margin: 0 0 10px; font-size: 30px; }
    p { color: #b8c2d2; line-height: 1.55; }
    .code {
      margin: 24px auto;
      padding: 18px;
      border-radius: 16px;
      background: #05070a;
      border: 1px solid #2a3040;
      font-size: 36px;
      letter-spacing: 7px;
      font-weight: 800;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      background: #f5f7fb;
      color: #080a0f;
    }
    .status { margin-top: 18px; color: #8d9bb0; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <h1>SW Air Link</h1>
    <p>Abra o app no celular e use este código para conectar ao navegador.</p>
    <div class="code" id="pairCode">482913</div>
    <button type="button" onclick="generateCode()">Gerar novo código</button>
    <div class="status">v0.1-r4 — base inicial. Espelhamento real entra em versão futura.</div>
  </main>
  <script>
    function generateCode() {
      const code = Math.floor(100000 + Math.random() * 900000).toString();
      document.getElementById('pairCode').textContent = code;
    }
  </script>
</body>
</html>

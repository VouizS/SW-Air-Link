<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SW Air Link</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #090b10;
      color: #f4f7fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(59, 92, 169, 0.25), transparent 36rem),
        #090b10;
    }

    main {
      width: min(96vw, 720px);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(18, 22, 31, .92);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -1px;
    }

    p { color: #b9c4d6; line-height: 1.55; }

    label {
      display: block;
      margin: 18px 0 8px;
      color: #d8deea;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      background: #090b10;
      color: #f4f7fb;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font-weight: 800;
      color: #08101f;
      background: #ffffff;
      cursor: pointer;
      font-size: 16px;
    }

    button.secondary {
      background: rgba(255,255,255,.08);
      color: #f4f7fb;
      border: 1px solid rgba(255,255,255,.14);
    }

    .code {
      margin: 18px 0;
      padding: 24px;
      text-align: center;
      border-radius: 18px;
      background: #05070a;
      border: 1px solid rgba(255,255,255,.12);
      font-size: clamp(34px, 10vw, 70px);
      font-weight: 900;
      letter-spacing: .18em;
      min-height: 120px;
      display: grid;
      place-items: center;
    }

    .status {
      margin-top: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      padding: 16px;
      color: #c8d2e4;
    }

    .mirror-placeholder {
      margin-top: 18px;
      border: 1px dashed rgba(255,255,255,.22);
      min-height: 220px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #8fa0b8;
      text-align: center;
      padding: 24px;
      background: rgba(0,0,0,.18);
    }

    .small { font-size: 13px; color: #8996aa; }
  </style>
</head>
<body>
  <main>
    <h1>SW Air Link</h1>
    <p>Crie um código neste navegador e digite no app Android. Esta versão testa o pareamento real, sem espelhamento falso.</p>

    <label for="serverUrl">Servidor WebSocket</label>
    <input id="serverUrl" spellcheck="false" />

    <button id="createButton">Criar código de conexão</button>
    <button class="secondary" id="disconnectButton">Desconectar</button>

    <div class="code" id="pairCode">------</div>

    <div class="status" id="status">Aguardando início.</div>

    <section class="mirror-placeholder">
      <div>
        <strong>Área futura de espelhamento</strong>
        <p class="small">Quando o MediaProjection entrar no app, a tela aparecerá aqui.</p>
      </div>
    </section>
  </main>

  <script>
    const serverInput = document.getElementById('serverUrl');
    const createButton = document.getElementById('createButton');
    const disconnectButton = document.getElementById('disconnectButton');
    const pairCode = document.getElementById('pairCode');
    const statusBox = document.getElementById('status');
    let socket = null;

    function defaultWsUrl() {
      if (location.protocol === 'http:' || location.protocol === 'https:') {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${protocol}//${location.host}`;
      }
      return 'ws://127.0.0.1:8080';
    }

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function closeSocket() {
      if (socket) {
        socket.close();
        socket = null;
      }
    }

    function createRoom() {
      closeSocket();
      const url = serverInput.value.trim() || defaultWsUrl();
      localStorage.setItem('swair_server_url', url);
      pairCode.textContent = '------';
      setStatus(`Conectando ao servidor ${url} ...`);

      socket = new WebSocket(url);

      socket.addEventListener('open', () => {
        setStatus('Servidor conectado. Criando sala...');
        socket.send(JSON.stringify({ type: 'create_room', role: 'web' }));
      });

      socket.addEventListener('message', (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch { return; }

        if (data.type === 'hello') {
          setStatus(data.message || 'Servidor conectado.');
        }

        if (data.type === 'room_created') {
          pairCode.textContent = data.roomCode;
          setStatus(`Código criado: ${data.roomCode}. Abra o app e digite este código.`);
        }

        if (data.type === 'peer_joined') {
          setStatus(`${data.deviceName || 'Telefone'} entrou na sala. Pareamento real confirmado.`);
        }

        if (data.type === 'peer_left') {
          setStatus('O outro dispositivo saiu da sala.');
        }

        if (data.type === 'error') {
          setStatus(`Erro: ${data.message || data.code || 'falha desconhecida'}`);
        }
      });

      socket.addEventListener('close', () => {
        setStatus('Conexão fechada. Crie outro código quando quiser.');
      });

      socket.addEventListener('error', () => {
        setStatus('Não consegui conectar ao servidor. Rode airful server ou confira o endereço WebSocket.');
      });
    }

    serverInput.value = localStorage.getItem('swair_server_url') || defaultWsUrl();
    createButton.addEventListener('click', createRoom);
    disconnectButton.addEventListener('click', () => {
      closeSocket();
      pairCode.textContent = '------';
      setStatus('Desconectado.');
    });
  </script>
</body>
</html>

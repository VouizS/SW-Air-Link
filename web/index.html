<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SW Air Link</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #090b10;
      color: #f5f7fb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #17233d 0, #090b10 46%, #050608 100%);
    }

    main {
      width: min(92vw, 520px);
      padding: 28px;
      border-radius: 24px;
      background: rgba(16, 20, 30, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      letter-spacing: -0.6px;
    }

    p {
      margin: 0 auto;
      max-width: 420px;
      color: #b9c4d6;
      line-height: 1.5;
    }

    .code {
      margin: 26px auto 18px;
      padding: 18px 20px;
      border-radius: 18px;
      background: #05070b;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: clamp(32px, 9vw, 52px);
      letter-spacing: 8px;
      font-weight: 800;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #0a0d12;
      background: #f6f8ff;
    }

    .status {
      margin-top: 18px;
      color: #8ea0bb;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>SW Air Link</h1>
    <p>Abra o app no Android e digite este código. Esta página é a base do futuro painel de espelhamento.</p>
    <div class="code" id="pairCode">482913</div>
    <button type="button" onclick="generateCode()">Gerar novo código</button>
    <div class="status">v0.1-r5 • pareamento real em preparação</div>
  </main>

  <script>
    function generateCode() {
      const code = String(Math.floor(100000 + Math.random() * 900000));
      document.getElementById('pairCode').textContent = code;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SW Air Link</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: #151922;
      --panel-2: #05070a;
      --line: #2a3040;
      --text: #f4f7fb;
      --muted: #b9c2d0;
      --soft: #8fa0b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #182033 0, var(--bg) 48%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      text-align: center;
    }
    .card {
      width: min(94vw, 520px);
      padding: 30px;
      border-radius: 24px;
      background: rgba(21, 25, 34, .96);
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0,0,0,.38);
    }
    h1 { margin: 0 0 10px; font-size: clamp(30px, 6vw, 44px); }
    p { color: var(--muted); line-height: 1.55; margin: 0; }
    .code {
      margin: 26px auto;
      padding: 20px;
      border-radius: 18px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      font-size: clamp(34px, 8vw, 54px);
      letter-spacing: 8px;
      font-weight: 800;
      user-select: all;
    }
    .mirror {
      margin-top: 22px;
      border-radius: 20px;
      border: 1px dashed var(--line);
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--soft);
      background: rgba(5, 7, 10, .65);
    }
    button {
      border: 0;
      border-radius: 15px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 800;
      background: #ffffff;
      color: #0b0d10;
      cursor: pointer;
    }
    .status { margin-top: 18px; color: var(--soft); font-size: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>SW Air Link</h1>
    <p>Abra o app no celular e digite este código para conectar ao navegador.</p>
    <div class="code" id="pairCode">482913</div>
    <button onclick="generateCode()">Gerar novo código</button>
    <div class="mirror">Área de espelhamento real entra nas próximas versões.</div>
    <div class="status" id="status">Aguardando conexão do telefone...</div>
  </main>

  <script>
    function generateCode() {
      const code = Math.floor(100000 + Math.random() * 900000).toString();
      document.getElementById('pairCode').textContent = code;
      document.getElementById('status').textContent = 'Novo código gerado. Aguardando conexão...';
    }
  </script>
</body>
</html>

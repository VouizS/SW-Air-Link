<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SW Air Link</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050609;
      --card: #10131a;
      --border: #272c38;
      --text: #f8fafc;
      --muted: #a9b3c5;
      --blue: #4f68a8;
      --soft: #151b29;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, #182033 0, #050609 42%, #000 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    main {
      width: min(94vw, 520px);
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--card);
      padding: 30px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
    }
    .icon { font-size: 54px; color: #2d6bdb; margin-bottom: 14px; }
    h1 { margin: 0; font-size: 34px; letter-spacing: -.8px; }
    p { color: var(--muted); line-height: 1.5; }
    .code {
      margin: 22px 0;
      padding: 22px;
      border-radius: 20px;
      background: #000;
      border: 1px solid var(--border);
      font-size: 38px;
      letter-spacing: 8px;
      font-weight: 800;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 800;
      background: var(--blue);
      color: white;
      cursor: pointer;
    }
    .status {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: var(--soft);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .hint { font-size: 13px; color: #7f8aa0; margin-top: 18px; }
  </style>
</head>
<body>
  <main>
    <div class="icon">▰◜</div>
    <h1>SW Air Link</h1>
    <p>Abra o app no celular, informe o servidor WebSocket e digite o código abaixo.</p>
    <div class="code" id="pairCode">------</div>
    <button onclick="newCode()">Gerar novo código</button>
    <div class="status" id="status">Aguardando telefone...</div>
    <div class="hint" id="wsHint"></div>
  </main>

  <script>
    let socket = null;
    let roomCode = '';

    function socketUrl() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${protocol}//${location.host}`;
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function newCode() {
      roomCode = Math.floor(100000 + Math.random() * 900000).toString();
      document.getElementById('pairCode').textContent = roomCode;
      connectBrowser();
    }

    function connectBrowser() {
      if (socket) socket.close();
      const url = socketUrl();
      document.getElementById('wsHint').textContent = `No app use: ${url}`;
      setStatus('Aguardando telefone na sala ' + roomCode + '...');

      socket = new WebSocket(url);
      socket.onopen = () => {
        socket.send(JSON.stringify({ type: 'join', role: 'browser', roomCode, version: 'v0.2-r4' }));
      };
      socket.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          if (message.type === 'joined') setStatus('Navegador conectado. Aguardando telefone...');
          if (message.type === 'peer_joined') setStatus('Telefone conectado. Espelhamento real entra em versão futura.');
          if (message.type === 'peer_left') setStatus('Telefone desconectado.');
          if (message.type === 'error') setStatus(message.message || 'Erro no servidor.');
        } catch (_) {
          setStatus('Mensagem desconhecida recebida.');
        }
      };
      socket.onerror = () => setStatus('Erro no WebSocket. Verifique se o servidor está rodando.');
      socket.onclose = () => setStatus('Conexão encerrada.');
    }

    newCode();
  </script>
</body>
</html>
